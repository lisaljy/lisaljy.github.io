<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Preview</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #181818;
        color: #f6f1ea;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        padding: 18px 22px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      }

      h1 {
        margin: 0;
        font-size: 1rem;
        font-weight: 700;
      }

      a {
        color: #f6f1ea;
        font-size: 0.9rem;
      }

      .stage {
        display: grid;
        grid-template-columns: minmax(560px, 1fr) 430px;
        gap: 22px;
        align-items: start;
        padding: 22px;
      }

      .panel {
        min-width: 0;
      }

      .label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
        color: #d8d0c6;
        font-size: 0.86rem;
      }

      .frame-shell {
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        background: #faf8f4;
      }

      iframe {
        display: block;
        width: 100%;
        border: 0;
        background: #faf8f4;
      }

      .desktop iframe {
        height: 760px;
      }

      .phone .frame-shell {
        width: 390px;
        max-width: 100%;
        margin-left: auto;
        margin-right: auto;
      }

      .phone iframe {
        width: 390px;
        height: 844px;
      }

      @media (max-width: 1080px) {
        .stage {
          grid-template-columns: 1fr;
        }

        .phone .frame-shell {
          margin-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Responsive Preview</h1>
      <a id="open-link" href="http://127.0.0.1:4321/" target="_blank" rel="noreferrer">Open site</a>
    </header>

    <main class="stage">
      <section class="panel desktop" aria-label="Desktop preview">
        <div class="label">
          <span>Desktop browser</span>
          <span>fluid width</span>
        </div>
        <div class="frame-shell">
          <iframe data-preview-frame title="Desktop browser preview"></iframe>
        </div>
      </section>

      <section class="panel phone" aria-label="Phone preview">
        <div class="label">
          <span>Phone screen</span>
          <span>390 x 844</span>
        </div>
        <div class="frame-shell">
          <iframe data-preview-frame title="Phone preview"></iframe>
        </div>
      </section>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const rawPath = params.get("path") || "/";
      const path = rawPath.startsWith("/") ? rawPath : "/";
      const targetUrl = `http://127.0.0.1:4321${path}`;
      const frameUrl = `${targetUrl}${targetUrl.includes("?") ? "&" : "?"}preview=${Date.now()}`;

      document.getElementById("open-link").href = targetUrl;
      for (const frame of document.querySelectorAll("[data-preview-frame]")) {
        frame.src = frameUrl;
      }
    </script>
  </body>
</html>
